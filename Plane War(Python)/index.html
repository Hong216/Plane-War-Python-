<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            overflow: hidden;
            aspect-ratio: 480 / 700;
            height: 100vh;
            max-width: 100vw;
        }
        
        #gameCanvas {
            display: block;
            background: #000;
            width: 100%;
            height: 100%;
        }
        
        #fullscreenBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 8px 14px;
            font-size: 14px;
            color: #fff;
            background: #444;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
        }
        
        #fullscreenBtn:hover {
            background: #555;
        }
        
        #gameContainer:fullscreen {
            aspect-ratio: auto;
            height: 100vh;
            max-width: none;
            width: 100vw;
            background: #000;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #ui.active {
            pointer-events: auto;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
        }
        
        .screen.active {
            display: flex;
        }
        
        .title {
            font-size: 48px;
            color: #00ffff;
            margin-bottom: 30px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 40px;
        }
        
        .level-card {
            width: 360px;
            height: 100px;
            margin: 10px;
            padding: 20px;
            border: 2px solid #666;
            border-radius: 5px;
            background: #2a2a2a;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .level-card:hover {
            border-color: #ffff00;
            background: #3a3a3a;
        }
        
        .level-card.selected {
            border-color: #00ffff;
            background: #1e3c64;
        }
        
        .level-name {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .level-desc {
            font-size: 14px;
            color: #999;
        }
        
        .level-normal .level-name { color: #00ff00; }
        .level-elite .level-name { color: #ffff00; }
        .level-hidden .level-name { color: #ff0000; }
        
        .bg-selector {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
        }
        
        .bg-thumb {
            width: 100px;
            height: 60px;
            border: 2px solid #666;
            border-radius: 3px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

        .bg-thumb:hover {
            border-color: #ffff00;
        }

        .bg-thumb.selected {
            border-color: #00ffff;
        }
        
        .bg-name {
            font-size: 12px;
            color: #ccc;
            text-align: center;
            margin-top: 5px;
        }
        
        .hint {
            position: absolute;
            bottom: 100px;
            font-size: 14px;
            color: #888;
        }
        
        .game-over-score {
            font-size: 36px;
            color: #fff;
            margin: 20px 0;
        }
        
        .game-over-best {
            font-size: 24px;
            color: #ffff00;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            color: #fff;
            background: #555;
            border: 2px solid #888;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        .btn:hover {
            background: #666;
        }
        
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .pause-overlay.active {
            display: flex;
        }
        
        .pause-title {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .pause-hint {
            font-size: 18px;
            color: #ccc;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
        }
        
        #hud div {
            margin: 5px 0;
        }
        
        #bombCount {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
        }
        
        #lifeCount {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
        }
        
        .life-icon {
            width: 30px;
            height: 30px;
            background: url('images/life.png') no-repeat center center;
            background-size: contain;
        }
        
        #pauseBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: url('images/pause_nor.png') no-repeat center center;
            background-size: contain;
            cursor: pointer;
            border: none;
        }
        
        #pauseBtn.paused {
            background-image: url('images/resume_nor.png');
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <button id="fullscreenBtn">全屏</button>
        <canvas id="gameCanvas" width="480" height="700"></canvas>
        
        <div id="ui" class="active">
            <div id="levelSelect" class="screen active">
                <h1 class="title">飞 机 大 战</h1>
                <p class="subtitle">选择关卡开始游戏</p>
                
                <div class="level-card level-normal" data-level="1">
                    <div class="level-name">普通关卡</div>
                    <div class="level-desc">标准难度 · 适合新手玩家</div>
                </div>
                
                <div class="level-card level-elite" data-level="2">
                    <div class="level-name">精英关卡</div>
                    <div class="level-desc">敌机更多更快 · 适合有经验玩家</div>
                </div>
                
                <div class="level-card level-hidden" data-level="3">
                    <div class="level-name">隐藏关卡</div>
                    <div class="level-desc">极限挑战 · 适合高手玩家</div>
                </div>
                
                <div class="hint">点击关卡卡片开始游戏 · 点击下方选择背景</div>
                
                <div class="bg-selector">
                    <div>
                        <div class="bg-thumb selected" data-bg="0" style="background-image: url('images/background.png')"></div>
                        <div class="bg-name">经典天空</div>
                    </div>
                    <div>
                        <div class="bg-thumb" data-bg="1" style="background-image: url('images/background_sakura.png')"></div>
                        <div class="bg-name">樱花春日</div>
                    </div>
                    <div>
                        <div class="bg-thumb" data-bg="2" style="background-image: url('images/background_vaporwave.png')"></div>
                        <div class="bg-name">霓虹都市</div>
                    </div>
                    <div>
                        <div class="bg-thumb" data-bg="3" style="background-image: url('images/background_lofi.png')"></div>
                        <div class="bg-name">Lo-Fi雨夜</div>
                    </div>
                </div>
            </div>
            
            <div id="gameOver" class="screen">
                <h1 class="title">游戏结束</h1>
                <div class="game-over-score">你的得分: <span id="finalScore">0</span></div>
                <div class="game-over-best">最佳成绩: <span id="bestScore">0</span></div>
                <button class="btn" id="restartBtn">重新开始</button>
                <button class="btn" id="menuBtn">返回菜单</button>
            </div>
            
            <div id="pauseOverlay" class="pause-overlay">
                <div class="pause-title">游戏暂停</div>
                <div class="pause-hint">按 ESC 继续 · 按 U 返回菜单</div>
            </div>
        </div>
        
        <div id="hud" style="display: none;">
            <div>得分: <span id="score">0</span></div>
            <div style="color: #ffff00;">最佳: <span id="best">0</span></div>
        </div>
        
        <div id="bombCount" style="display: none;">
            <img src="images/bomb.png" style="width: 40px; height: 40px; vertical-align: middle;">
            <span id="bombNum">× 3</span>
        </div>
        
        <div id="lifeCount" style="display: none;"></div>
        
        <button id="pauseBtn" style="display: none;"></button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
